services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - DATABASE_URL=file:./data/sistemaadm.db
      - REDIS_URL=redis://redis:6379
      - WA_SESSION_PATH=/app/storage/session
      - WA_LOG_LEVEL=info
      - API_CORS_ENABLED=true
      - API_RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_MSGS_PER_MIN=12
      - CLUB_NAME=ROYAL CLUB
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium-browser
      - CHROME_FLAGS=--no-sandbox --disable-setuid-sandbox --disable-dev-shm-usage --disable-accelerated-2d-canvas --no-first-run --no-zygote --single-process --disable-gpu
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
      - ./logs:/app/logs
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - royal-club-network
    shm_size: 2gb
    security_opt:
      - seccomp:unconfined

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - royal-club-network

  python-ai:
    build:
      context: .
      dockerfile: Dockerfile.python
    environment:
      - PYTHONPATH=/app/src
      - DATABASE_URL=file:./data/sistemaadm.db
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - royal-club-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8001/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  redis_data:

networks:
  royal-club-network:
    driver: bridge
