version: '3.8'

services:
  wa-bot:
    build: ./wa-bot
    container_name: dave_wa_bot
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./wa-bot/storage:/app/storage
      - ./wa-bot/config:/app/config
      - ./wa-bot/logs:/app/logs
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://dave_redis:6379
    networks:
      - dave_net

networks:
  dave_net:
    external: true
